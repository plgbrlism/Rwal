# ~/.config/rwal/theme-map.toml
# Maps semantic color roles to each app's native config format.
#
# Run:  rwal -g           (render all apps)
#       rwal -g alacritty (render one app)
# Chain: rwal -i wall.jpg && rwal -g
#
# Formats: toml | css | ini  (default: "key = value")
#
# Roles: background, surface, foreground, cursor,
#        primary, secondary, tertiary, accent,
#        error, success, warning, info,
#        neutral, neutral_variant,
#        on_background, on_primary, on_surface

[alacritty]
output = "~/.config/alacritty/alacritty-colors.toml"
format = "toml"

[alacritty.map]
"colors.primary.background" = "background"
"colors.primary.foreground" = "foreground"
"colors.cursor.cursor"      = "cursor"
"colors.normal.black"       = "background"
"colors.normal.red"         = "error"
"colors.normal.green"       = "success"
"colors.normal.yellow"      = "warning"
"colors.normal.blue"        = "primary"
"colors.normal.magenta"     = "secondary"
"colors.normal.cyan"        = "info"
"colors.normal.white"       = "neutral_variant"
"colors.bright.black"       = "neutral"
"colors.bright.red"         = "error"
"colors.bright.green"       = "success"
"colors.bright.yellow"      = "warning"
"colors.bright.blue"        = "primary"
"colors.bright.magenta"     = "secondary"
"colors.bright.cyan"        = "info"
"colors.bright.white"       = "foreground"

[waybar]
output = "~/.config/waybar/colors.css"
format = "css"

[waybar.map]
background      = "background"
surface         = "surface"
foreground      = "foreground"
color-primary   = "primary"
color-secondary = "secondary"
color-accent    = "accent"
color-error     = "error"
color-success   = "success"
color-warning   = "warning"
color-info      = "info"
color-neutral   = "neutral"

[dunst]
output = "~/.config/dunst/dunstrc-colors"
format = "ini"

[dunst.map]
background  = "background"
foreground  = "foreground"
frame_color = "primary"
